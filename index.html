<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Tiếng Nhật - Thẻ Lật Toàn Tập Kana</title>
    <style>
        :root {
            --primary-color: #ff7675;
            --bg-color: #fab1a0;
            --tab-active: #2d3436;
            --tab-inactive: #dfe6e9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffeaa7, var(--bg-color));
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            color: #2d3436;
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            text-align: center;
        }
        p.subtitle {
            color: #636e72;
            margin-bottom: 20px;
            font-size: 1.1em;
            text-align: center;
        }
        
        /* Menu Tabs lớn (Hiragana / Katakana) */
        .main-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 900px;
        }
        .main-tab-btn {
            flex: 1;
            padding: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background-color: var(--tab-inactive);
            color: #2d3436;
            transition: all 0.3s;
        }
        .main-tab-btn.active {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 10px rgba(255, 118, 117, 0.4);
        }

        /* Menu Tabs con (Cơ bản / Đục / Ghép...) */
        .sub-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
            justify-content: center;
            width: 100%;
            max-width: 900px;
        }
        .sub-tab-btn {
            padding: 8px 16px;
            font-size: 0.95rem;
            font-weight: 600;
            border: 2px solid transparent;
            border-radius: 20px;
            cursor: pointer;
            background-color: white;
            color: #636e72;
            transition: all 0.2s;
        }
        .sub-tab-btn.active {
            background-color: var(--tab-active);
            color: white;
        }

        /* Khu vực điều khiển lật tất cả */
        .controls {
            margin-bottom: 20px;
        }
        .control-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 25px;
            background-color: var(--tab-active);
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }
        .control-btn:active {
            transform: scale(0.95);
        }

        /* Container chứa các card */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 900px;
            margin-bottom: 30px;
        }

        /* Hiệu ứng lật thẻ */
        .card {
            background-color: transparent;
            width: 100%;
            height: 150px;
            perspective: 1000px;
            cursor: pointer;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.4s;
            transform-style: preserve-3d;
            box-shadow: 0 4px 8px rgba(0,0,0,0.08);
            border-radius: 12px;
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            box-sizing: border-box;
            padding: 5px;
        }
        .card-front {
            background-color: #ffffff;
            color: #2d3436;
            border: 2px solid #fff;
        }
        .card-front .kana {
            font-size: 3.2rem;
            font-weight: bold;
        }
        .card-front .type {
            font-size: 0.75rem;
            color: #b2bec3;
            margin-top: 2px;
        }
        .card-back {
            background-color: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border: 2px solid var(--primary-color);
        }
        .card-back .romaji {
            font-size: 2.5rem;
            font-weight: bold;
        }
        .card-back .note {
            font-size: 0.75rem;
            opacity: 0.9;
            margin-top: 2px;
        }

        /* Panel thông tin bổ sung cho âm ngắt/âm dài */
        .info-panel {
            background: white;
            padding: 20px;
            border-radius: 12px;
            max-width: 860px;
            width: 100%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            color: #2d3436;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .info-panel h3 {
            margin-top: 0;
            color: var(--primary-color);
            border-bottom: 2px solid #ffeaa7;
            padding-bottom: 5px;
        }
        .info-panel code {
            background: #f1f2f6;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            color: #d63031;
        }

        footer {
            margin-top: auto;
            color: #636e72;
            font-size: 0.9rem;
            padding: 10px;
        }
    </style>
</head>
<body>

    <h1>Ứng Dụng Học Tiếng Nhật Thông Minh</h1>
    <p class="subtitle">Chọn Tab, bấm vào từng thẻ để xem Romaji hoặc lật nhanh tất cả</p>

    <div class="main-tabs">
        <button class="main-tab-btn active" onclick="setMainTab('hiragana')">平仮名 HIRAGANA</button>
        <button class="main-tab-btn" onclick="setMainTab('katakana')">片仮名 KATAKANA</button>
    </div>

    <div class="sub-tabs">
        <button class="sub-tab-btn active" onclick="setSubTab('base')">Âm Cơ Bản (Seion)</button>
        <button class="sub-tab-btn" onclick="setSubTab('dakuon')">Âm Đục / Bán Đục (Dakuon)</button>
        <button class="sub-tab-btn" onclick="setSubTab('yoon')">Âm Ghép (Yōon)</button>
        <button class="sub-tab-btn" onclick="setSubTab('rules')">Âm Ngắt & Âm Dài (Lý thuyết)</button>
    </div>

    <div class="controls" id="control-panel">
        <button class="control-btn" onclick="flipAll()">Lật tất cả thẻ</button>
    </div>

    <div class="container" id="cards-container">
        </div>

    <div class="info-panel" id="special-info-panel" style="display: none;">
        </div>

    <footer>Học tiếng Nhật mỗi ngày • Thẻ thông minh Kana</footer>

    <script>
        // DỮ LIỆU ĐẦY ĐỦ BẢNG CHỮ CÁI TIẾNG NHẬT
        const data = {
            hiragana: {
                base: [
                    {k: "あ", r: "a"}, {k: "い", r: "i"}, {k: "う", r: "u"}, {k: "え", r: "e"}, {k: "お", r: "o"},
                    {k: "か", r: "ka"}, {k: "き", r: "ki"}, {k: "く", r: "ku"}, {k: "け", r: "ke"}, {k: "こ", r: "ko"},
                    {k: "さ", r: "sa"}, {k: "し", r: "shi"}, {k: "す", r: "su"}, {k: "せ", r: "se"}, {k: "そ", r: "so"},
                    {k: "た", r: "ta"}, {k: "ち", r: "chi"}, {k: "つ", r: "tsu"}, {k: "て", r: "te"}, {k: "と", r: "to"},
                    {k: "な", r: "na"}, {k: "に", r: "ni"}, {k: "ぬ", r: "nu"}, {k: "ね", r: "ne"}, {k: "の", r: "no"},
                    {k: "は", r: "ha"}, {k: "ひ", r: "hi"}, {k: "ふ", r: "fu"}, {k: "へ", r: "he"}, {k: "ほ", r: "ho"},
                    {k: "ま", r: "ma"}, {k: "み", r: "mi"}, {k: "む", r: "mu"}, {k: "め", r: "me"}, {k: "も", r: "mo"},
                    {k: "や", r: "ya"}, {k: "", r: ""}, {k: "ゆ", r: "yu"}, {k: "", r: ""}, {k: "よ", r: "yo"},
                    {k: "ら", r: "ra"}, {k: "り", r: "ri"}, {k: "る", r: "ru"}, {k: "れ", r: "re"}, {k: "ろ", r: "ro"},
                    {k: "わ", r: "wa"}, {k: "", r: ""}, {k: "", r: ""}, {k: "", r: ""}, {k: "を", r: "wo/o"},
                    {k: "ん", r: "n"}
                ],
                dakuon: [
                    {k: "が", r: "ga"}, {k: "ぎ", r: "gi"}, {k: "ぐ", r: "gu"}, {k: "げ", r: "ge"}, {k: "ご", r: "go"},
                    {k: "ざ", r: "za"}, {k: "じ", r: "ji"}, {k: "ず", r: "zu"}, {k: "ぜ", r: "ze"}, {k: "ぞ", r: "zo"},
                    {k: "だ", r: "da"}, {k: "ぢ", r: "ji/di"}, {k: "づ", r: "zu/du"}, {k: "で", r: "de"}, {k: "ど", r: "do"},
                    {k: "ば", r: "ba"}, {k: "び", r: "bi"}, {k: "ぶ", r: "bu"}, {k: "べ", r: "be"}, {k: "ぼ", r: "bo"},
                    {k: "ぱ", r: "pa"}, {k: "ぴ", r: "pi"}, {k: "ぷ", r: "pu"}, {k: "ぺ", r: "pe"}, {k: "ぽ", r: "po"}
                ],
                yoon: [
                    {k: "きゃ", r: "kya"}, {k: "きゅ", r: "kyu"}, {k: "きょ", r: "kyo"},
                    {k: "しゃ", r: "sha"}, {k: "しゅ", r: "shu"}, {k: "しょ", r: "sho"},
                    {k: "ちゃ", r: "cha"}, {k: "ちゅ", r: "chu"}, {k: "ちょ", r: "cho"},
                    {k: "にゃ", r: "nya"}, {k: "にゅ", r: "nyu"}, {k: "にょ", r: "nyo"},
                    {k: "ひゃ", r: "hya"}, {k: "ひゅ", r: "hyu"}, {k: "ひょ", r: "hyo"},
                    {k: "みゃ", r: "mya"}, {k: "みゅ", r: "myu"}, {k: "みょ", r: "myo"},
                    {k: "りゃ", r: "rya"}, {k: "りゅ", r: "ryu"}, {k: "りょ", r: "ryo"},
                    {k: "ぎゃ", r: "gya"}, {k: "ぎゅ", r: "gyu"}, {k: "ぎょ", r: "gyo"},
                    {k: "じゃ", r: "ja"}, {k: "じゅ", r: "ju"}, {k: "じょ", r: "jo"},
                    {k: "びゃ", r: "bya"}, {k: "びゅ", r: "byu"}, {k: "びょ", r: "byo"},
                    {k: "ぴゃ", r: "pya"}, {k: "ぴゅ", r: "pyu"}, {k: "ぴょ", r: "pyo"}
                ],
                rules: `
                    <h3>1. Âm Ngắt (Sokuon) - Hiragana</h3>
                    <p>Sử dụng chữ <code>つ</code> viết nhỏ lại thành <code>っ</code>. Âm ngắt không tự phát âm mà dùng để gấp đôi phụ âm đứng ngay sau nó.</p>
                    <ul>
                        <li>Ví dụ: ざっし (zasshi - tạp chí)</li>
                        <li>Ví dụ: きって (kitte - tem thư)</li>
                    </ul>
                    <h3>2. Âm Dài (Chōon) - Hiragana</h3>
                    <p>Kéo dài nguyên âm của chữ đứng trước theo quy tắc:</p>
                    <ul>
                        <li>Hàng <b>A</b> thêm <code>あ</code>. Ví dụ: おかあさん (okāsan - mẹ)</li>
                        <li>Hàng <b>I</b> thêm <code>い</code>. Ví dụ: おにいさん (onīsan - anh trai)</li>
                        <li>Hàng <b>U</b> thêm <code>う</code>. Ví dụ: ゆうがた (yūgata - chiều tối)</li>
                        <li>Hàng <b>E</b> thêm <code>い</code> (đôi khi thêm <code>え</code>). Ví dụ: せんせい (sensei -> sensē), おねえさん (onēsan)</li>
                        <li>Hàng <b>O</b> thêm <code>う</code> (đôi khi thêm <code>お</code>). Ví dụ: とうきょう (tōkyō), おおきい (ōkī)</li>
                    </ul>
                `
            },
            katakana: {
                base: [
                    {k: "ア", r: "a"}, {k: "イ", r: "i"}, {k: "ウ", r: "u"}, {k: "エ", r: "e"}, {k: "オ", r: "o"},
                    {k: "カ", r: "ka"}, {k: "キ", r: "ki"}, {k: "ク", r: "ku"}, {k: "ケ", r: "ke"}, {k: "コ", r: "ko"},
                    {k: "サ", r: "sa"}, {k: "シ", r: "shi"}, {k: "ス", r: "su"}, {k: "セ", r: "se"}, {k: "ソ", r: "so"},
                    {k: "タ", r: "ta"}, {k: "チ", r: "chi"}, {k: "ツ", r: "tsu"}, {k: "テ", r: "te"}, {k: "ト", r: "to"},
                    {k: "ナ", r: "na"}, {k: "ニ", r: "ni"}, {k: "ヌ", r: "nu"}, {k: "ネ", r: "ne"}, {k: "ノ", r: "no"},
                    {k: "ハ", r: "ha"}, {k: "ヒ", r: "hi"}, {k: "フ", r: "fu"}, {k: "ヘ", r: "he"}, {k: "ホ", r: "ho"},
                    {k: "マ", r: "ma"}, {k: "ミ", r: "mi"}, {k: "ム", r: "mu"}, {k: "メ", r: "me"}, {k: "モ", r: "mo"},
                    {k: "ヤ", r: "ya"}, {k: "", r: ""}, {k: "ユ", r: "yu"}, {k: "", r: ""}, {k: "ヨ", r: "yo"},
                    {k: "ラ", r: "ra"}, {k: "リ", r: "ri"}, {k: "ル", r: "ru"}, {k: "レ", r: "re"}, {k: "ロ", r: "ro"},
                    {k: "ワ", r: "wa"}, {k: "", r: ""}, {k: "", r: ""}, {k: "", r: ""}, {k: "ヲ", r: "wo/o"},
                    {k: "ン", r: "n"}
                ],
                dakuon: [
                    {k: "ガ", r: "ga"}, {k: "ギ", r: "gi"}, {k: "グ", r: "gu"}, {k: "ゲ", r: "ge"}, {k: "ゴ", r: "go"},
                    {k: "ザ", r: "za"}, {k: "ジ", r: "ji"}, {k: "ズ", r: "zu"}, {k: "ゼ", r: "ze"}, {k: "ゾ", r: "zo"},
                    {k: "ダ", r: "da"}, {k: "ヂ", r: "ji/di"}, {k: "ヅ", r: "zu/du"}, {k: "デ", r: "de"}, {k: "ド", r: "do"},
                    {k: "バ", r: "ba"}, {k: "ビ", r: "bi"}, {k: "ブ", r: "bu"}, {k: "ベ", r: "be"}, {k: "ボ", r: "bo"},
                    {k: "パ", r: "pa"}, {k: "ピ", r: "pi"}, {k: "プ", r: "pu"}, {k: "ペ", r: "pe"}, {k: "ポ", r: "po"}
                ],
                yoon: [
                    {k: "キャ", r: "kya"}, {k: "キュ", r: "kyu"}, {k: "キョ", r: "kyo"},
                    {k: "シャ", r: "sha"}, {k: "シュ", r: "shu"}, {k: "ショ", r: "sho"},
                    {k: "チャ", r: "cha"}, {k: "チュ", r: "chu"}, {k: "チョ", r: "cho"},
                    {k: "ニャ", r: "nya"}, {k: "ニュ", r: "nyu"}, {k: "ニョ", r: "nyo"},
                    {k: "ヒゃ", r: "hya"}, {k: "ヒュ", r: "hyu"}, {k: "ヒョ", r: "hyo"},
                    {k: "ミャ", r: "mya"}, {k: "ミュ", r: "myu"}, {k: "ミョ", r: "myo"},
                    {k: "リャ", r: "rya"}, {k: "リュ", r: "ryu"}, {k: "リょ", r: "ryo"},
                    {k: "ギャ", r: "gya"}, {k: "ギュ", r: "gyu"}, {k: "ギョ", r: "gyo"},
                    {k: "ジャ", r: "ja"}, {k: "ジュ", r: "ju"}, {k: "ジョ", r: "jo"},
                    {k: "ビャ", r: "bya"}, {k: "ビュ", r: "byu"}, {k: "ビョ", r: "byo"},
                    {k: "ピャ", r: "pya"}, {k: "ピュ", r: "pyu"}, {k: "ピョ", r: "pyo"}
                ],
                rules: `
                    <h3>1. Âm Ngắt (Sokuon) - Katakana</h3>
                    <p>Sử dụng chữ Katakana <code>ツ</code> nhỏ lại thành <code>ッ</code>. Quy tắc nhân đôi phụ âm tương tự Hiragana.</p>
                    <ul>
                        <li>Ví dụ: コップ (koppu - cái cốc)</li>
                        <li>Ví dụ: ベッド (beddo - cái giường)</li>
                    </ul>
                    <h3>2. Âm Dài (Chōon) - Katakana</h3>
                    <p>Đối với bộ Katakana (chuyên dùng phiên âm tiếng nước ngoài), trường âm cực kỳ đơn giản. Nó không thêm chữ cái nguyên âm như Hiragana mà <b>chỉ dùng một dấu gạch ngang <code>ー</code></b> cho mọi hàng âm.</p>
                    <ul>
                        <li>Ví dụ: ケーキ (kēki - bánh ngọt)</li>
                        <li>Ví dụ: スーパー (sūpā - siêu thị)</li>
                        <li>Ví dụ: タクシー (takushī - taxi)</li>
                    </ul>
                `
            }
        };

        // Trạng thái hiện tại của ứng dụng
        let currentMainTab = 'hiragana';
        let currentSubTab = 'base';

        // Hàm thay đổi Tab lớn (Hiragana / Katakana)
        function setMainTab(tab) {
            currentMainTab = tab;
            // Cập nhật giao diện nút bấm
            document.querySelectorAll('.main-tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Đổi màu chủ đạo tùy theo bảng để dễ phân biệt (Tùy chọn thẩm mỹ)
            if(tab === 'katakana') {
                document.documentElement.style.setProperty('--primary-color', '#0984e3');
                document.documentElement.style.setProperty('--bg-color', '#74b9ff');
            } else {
                document.documentElement.style.setProperty('--primary-color', '#ff7675');
                document.documentElement.style.setProperty('--bg-color', '#fab1a0');
            }

            render();
        }

        // Hàm thay đổi Tab nhỏ (Cơ bản / Đục / Ghép / Lý thuyết)
        function setSubTab(tab) {
            currentSubTab = tab;
            document.querySelectorAll('.sub-tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            render();
        }

        // Hàm lật từng thẻ khi click vào
        function toggleCard(card) {
            card.classList.toggle('flipped');
        }

        // Hàm lật tất cả / Úp tất cả
        function flipAll() {
            const cards = document.querySelectorAll('.card');
            if (cards.length === 0) return;
            const anyUnflipped = Array.from(cards).some(card => !card.classList.contains('flipped'));
            cards.forEach(card => {
                if (anyUnflipped) {
                    card.classList.add('flipped');
                } else {
                    card.classList.remove('flipped');
                }
            });
        }

        // Hàm vẽ giao diện và đổ dữ liệu
        function render() {
            const container = document.getElementById('cards-container');
            const infoPanel = document.getElementById('special-info-panel');
            const controlPanel = document.getElementById('control-panel');
            
            // Nếu là tab lý thuyết âm ngắt âm dài
            if (currentSubTab === 'rules') {
                container.style.display = 'none';
                controlPanel.style.display = 'none';
                infoPanel.style.display = 'block';
                infoPanel.innerHTML = data[currentMainTab].rules;
                return;
            }

            // Nếu là các tab thẻ chữ cái thông thường
            container.style.display = 'grid';
            controlPanel.style.display = 'block';
            infoPanel.style.display = 'none';
            container.innerHTML = '';

            const listData = data[currentMainTab][currentSubTab];

            listData.forEach(item => {
                // Tạo khoảng trống cho bảng chữ cái Seion vuông vắn (các ô trống hàng Ya/Wa)
                if (item.k === "") {
                    const emptyDiv = document.createElement('div');
                    emptyDiv.style.visibility = 'hidden';
                    container.appendChild(emptyDiv);
                    return;
                }

                // Thiết kế thẻ lật sinh tự động
                const cardHtml = `
                    <div class="card" onclick="toggleCard(this)">
                        <div class="card-inner">
                            <div class="card-front">
                                <span class="kana">${item.k}</span>
                                <span class="type">${currentMainTab.toUpperCase()}</span>
                            </div>
                            <div class="card-back">
                                <span class="romaji">${item.r}</span>
                                <span class="note">Bấm để úp</span>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        // Khởi chạy ứng dụng lần đầu tiên
        render();
    </script>
</body>
</html>
