<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Tiếng Nhật - Thẻ Lật Toàn Tập Có Phát Âm Giọng Nhật</title>
    <style>
        :root {
            --primary-color: #ff7675;
            --bg-color: #fab1a0;
            --tab-active: #2d3436;
            --tab-inactive: #dfe6e9;
            --shuffle-color: #00b894;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffeaa7, var(--bg-color));
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            color: #2d3436;
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            text-align: center;
        }
        p.subtitle {
            color: #636e72;
            margin-bottom: 20px;
            font-size: 1.1em;
            text-align: center;
        }
        
        /* Menu Tabs lớn (Hiragana / Katakana) */
        .main-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 900px;
        }
        .main-tab-btn {
            flex: 1;
            padding: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background-color: var(--tab-inactive);
            color: #2d3436;
            transition: all 0.3s;
        }
        .main-tab-btn.active {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 10px rgba(255, 118, 117, 0.4);
        }

        /* Menu Tabs con */
        .sub-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
            justify-content: center;
            width: 100%;
            max-width: 900px;
        }
        .sub-tab-btn {
            padding: 8px 16px;
            font-size: 0.95rem;
            font-weight: 600;
            border: 2px solid transparent;
            border-radius: 20px;
            cursor: pointer;
            background-color: white;
            color: #636e72;
            transition: all 0.2s;
        }
        .sub-tab-btn.active {
            background-color: var(--tab-active);
            color: white;
        }

        /* Khu vực điều khiển */
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        .control-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 25px;
            background-color: var(--tab-active);
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s, background-color 0.2s;
        }
        .control-btn:active {
            transform: scale(0.95);
        }
        .control-btn.shuffle-btn {
            background-color: var(--shuffle-color);
        }
        .control-btn.shuffle-btn.active {
            background-color: #d63031;
        }

        /* Container chứa các card */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 900px;
            margin-bottom: 30px;
        }

        /* Hiệu ứng lật thẻ & có loa icon */
        .card {
            background-color: transparent;
            width: 100%;
            height: 150px;
            perspective: 1000px;
            cursor: pointer;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.4s;
            transform-style: preserve-3d;
            box-shadow: 0 4px 8px rgba(0,0,0,0.08);
            border-radius: 12px;
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            box-sizing: border-box;
            padding: 10px;
        }
        .card-front {
            background-color: #ffffff;
            color: #2d3436;
            border: 2px solid #fff;
        }
        .card-front .kana {
            font-size: 3.2rem;
            font-weight: bold;
            word-break: break-all;
        }
        .card.vocab-card .card-front .kana {
            font-size: 1.6rem;
            color: #2c3e50;
        }
        .card-front .type {
            font-size: 0.75rem;
            color: #b2bec3;
            margin-top: 5px;
        }
        
        /* Icon cái loa biểu thị có âm thanh */
        .audio-icon {
            position: absolute;
            top: 8px;
            right: 10px;
            font-size: 0.8rem;
            color: #b2bec3;
        }

        .card-back {
            background-color: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border: 2px solid var(--primary-color);
        }
        .card-back .romaji {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .card-back .meaning {
            font-size: 0.95rem;
            font-weight: 500;
            margin-top: 5px;
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 8px;
            border-radius: 15px;
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .card-back .note {
            font-size: 0.7rem;
            opacity: 0.8;
            margin-top: 8px;
        }

        /* Panel thông tin bổ sung */
        .info-panel {
            background: white;
            padding: 20px;
            border-radius: 12px;
            max-width: 860px;
            width: 100%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            color: #2d3436;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .info-panel h3 {
            margin-top: 0;
            color: var(--primary-color);
            border-bottom: 2px solid #ffeaa7;
            padding-bottom: 5px;
        }
        .info-panel code {
            background: #f1f2f6;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            color: #d63031;
        }

        footer {
            margin-top: auto;
            color: #636e72;
            font-size: 0.9rem;
            padding: 10px;
        }
    </style>
</head>

    <div class="controls" id="control-panel">

        let currentMainTab = 'hiragana';
        let currentSubTab = 'base';
        let isShuffled = false;

        // Hàm xử lý PHÁT ÂM TIẾNG NHẬT (Core feature mới)
        function speakJapanese(text) {
            if ('speechSynthesis' in window) {
                // Hủy các âm thanh đang phát dở (nếu bấm liên tục)
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ja-JP'; // Định dạng ngôn ngữ chuẩn tiếng Nhật
                utterance.rate = 0.7;    // Tốc độ nói vừa phải, dễ nghe để học tập
                
                window.speechSynthesis.speak(utterance);
            } else {
                console.log("Trình duyệt của bạn không hỗ trợ tính năng phát âm.");
            }
        }

        function setMainTab(tab) {
            currentMainTab = tab;
            isShuffled = false; 
            document.querySelectorAll('.main-tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if(tab === 'katakana') {
                document.documentElement.style.setProperty('--primary-color', '#0984e3');
                document.documentElement.style.setProperty('--bg-color', '#74b9ff');
            } else {
                document.documentElement.style.setProperty('--primary-color', '#ff7675');
                document.documentElement.style.setProperty('--bg-color', '#fab1a0');
            }
            render();
        }

        function setSubTab(tab) {
            currentSubTab = tab;
            isShuffled = false; 
            document.querySelectorAll('.sub-tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            render();
        }

        function toggleShuffle() {
            isShuffled = !isShuffled;
            render();
        }

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // Hàm lật thẻ đồng thời gọi hàm phát âm luôn
        function handleCardClick(card, textToSpeak) {
            card.classList.toggle('flipped');
            // Phát âm text tiếng Nhật ngay khi nhấn vào
            speakJapanese(textToSpeak);
        }

        function flipAll() {
            const cards = document.querySelectorAll('.card');
            if (cards.length === 0) return;
            const anyUnflipped = Array.from(cards).some(card => !card.classList.contains('flipped'));
            cards.forEach(card => {
                if (anyUnflipped) {
                    card.classList.add('flipped');
                } else {
                    card.classList.remove('flipped');
                }
            });
        }

        function render() {
            const container = document.getElementById('cards-container');
            const infoPanel = document.getElementById('special-info-panel');
            const controlPanel = document.getElementById('control-panel');
            const shuffleBtn = document.getElementById('shuffle-btn');
            
            if (isShuffled) {
                shuffleBtn.textContent = "Hủy xáo trộn (Bình thường)";
                shuffleBtn.classList.add('active');
            } else {
                shuffleBtn.textContent = "Xáo trộn ôn tập";
                shuffleBtn.classList.remove('active');
            }

            if (currentSubTab === 'rules') {
                container.style.display = 'none';
                controlPanel.style.display = 'none';
                infoPanel.style.display = 'block';
                infoPanel.innerHTML = data[currentMainTab].rules;
                return;
            }

            container.style.display = 'grid';
            controlPanel.style.display = 'flex';
            infoPanel.style.display = 'none';
            container.innerHTML = '';

            let listData = data[currentMainTab][currentSubTab];

            if (isShuffled) {
                const filteredData = listData.filter(item => item.k !== "");
                listData = shuffleArray(filteredData);
            }

            listData.forEach(item => {
                if (item.k === "") {
                    const emptyDiv = document.createElement('div');
                    emptyDiv.style.visibility = 'hidden';
                    container.appendChild(emptyDiv);
                    return;
                }

                const isVocab = currentSubTab === 'vocabulary';
                const backContent = isVocab 
                    ? `<span class="romaji">${item.r}</span><span class="meaning">${item.m}</span>`
                    : `<span class="romaji">${item.r}</span>`;

                // Truyền ký tự tiếng Nhật (item.k) thẳng vào hàm handleCardClick để nó đọc lên
                const cardHtml = `
                    <div class="card ${isVocab ? 'vocab-card' : ''}" onclick="handleCardClick(this, '${item.k}')">
                        <div class="card-inner">
                            <div class="card-front">
                                <span class="audio-icon">🔊</span>
                                <span class="kana">${item.k}</span>
                                <span class="type">${isVocab ? 'Từ vựng' : currentMainTab.toUpperCase()}</span>
                            </div>
                            <div class="card-back">
                                ${backContent}
                                <span class="note">Bấm để úp</span>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        render();
    </script>
</body>
</html>
